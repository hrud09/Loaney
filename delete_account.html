<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account - Loaney</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0D0D12;
            --card-bg: #13131A;
            --text-primary: #FFFFFF;
            --text-secondary: #9FA2B4;
            --accent-green: #2E7D32;
            --accent-red: #D32F2F;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            color: var(--accent-green);
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 12px;
        }

        p {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="email"], textarea {
            width: 100%;
            padding: 16px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            box-sizing: border-box;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input[type="email"]:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-green);
            background-color: rgba(255, 255, 255, 0.08);
        }

        textarea {
            resize: none;
            height: 100px;
        }

        .submit-btn {
            background-color: var(--accent-red);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .footer a {
            color: var(--accent-green);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">Loaney</div>
    <h1>Account Deletion Request</h1>
    <p>Please enter the registered email address of the account you want to delete. All associated database records, history, and profile details will be permanently wiped.</p>

    <form id="deleteForm">
        <div class="form-group">
            <label for="email">Registered Email Address</label>
            <input type="email" id="email" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
            <label for="reason">Reason for deletion (Optional)</label>
            <textarea id="reason" placeholder="Please let us know how we can improve..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Request Data Deletion</button>
    </form>

    <div class="footer">
        Back to <a href="privacy_policy.md">Privacy Policy</a>
    </div>
</div>

<script>
    document.getElementById('deleteForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const reason = document.getElementById('reason').value;

        const subject = encodeURIComponent("Loaney Account Deletion Request");
        const body = encodeURIComponent(
            `Please delete my Loaney account and all associated data.\n\n` +
            `Registered Email: ${email}\n` +
            `Reason: ${reason || "Not specified"}\n\n` +
            `Thank you.`
        );

        // This will open the user's native mail app prefilled
        window.location.href = `mailto:mahadi.itch.io@gmail.com?subject=${subject}&body=${body}`;
    });
</script>

</body>
</html>
